/* Lightbox */  
.lightbox {  
    display: none;  
    position: fixed;  
    z-index: 1000;  
    padding-top: 60px;  
    left: 0;  
    top: 0;  
    width: 100%;

  @keyframes glowHeart {

.lightbox-content {  
    margin: auto;  
    display: block;  
    max-width: 90%;  
    max-height: 80vh;  
    border-radius: 10px;  
    animation: zoomIn 0.3s ease;  
}  
  /* Animated Glowing Boundary for Lightbox Image */
.lightbox-content {
    animation: glowHeart 2s infinite alternate, zoomIn 0.3s ease;
    border-radius: 15px;
    border: 10px solid transparent; /* Transparent initial border */
    background: linear-gradient(45deg, #ffd700, #ff6b6b, #8b5cf6, #00d4ff);
    background-clip: padding-box;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
    position: relative;
}

/* Add a Shimmering Effect to the Border */
.lightbox-content::before {
    content: "";
    position: absolute;
    top: -12px;
    left: -12px;
    right: -12px;
    bottom: -12px;
    border-radius: 20px;
    background: linear-gradient(45deg, #ffd700, #ff6b6b, #8b5cf6, #00d4ff);
    background-size: 300% 300%;
    animation: shimmer 6s infinite linear;
    z-index: -1;
}

/* Shimmer Animation */
@keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Glowing Animation */
@keyframes glowHeart {

<script>
// Lightbox functionality

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxCaption = document.querySelector('.caption');
const closeBtn = document.querySelector('.close');

// Open lightbox
document.querySelectorAll('.image-container').forEach(container => {
container.addEventListener('click', () => {
lightbox.style.display = 'block';
lightboxImg.src = container.getAttribute('data-src');
lightboxCaption.textContent = container.querySelector('img').alt;
});
});

// Close lightbox
closeBtn.addEventListener('click', () => {
lightbox.style.display = 'none';
});

// Close lightbox when clicking outside the image
lightbox.addEventListener('click', (e) => {
if (e.target !== lightboxImg) {
lightbox.style.display = 'none';
}
});

</script>

                    document.removeEventListener("mousemove", playOnInteraction);  
                    document.removeEventListener("scroll", playOnInteraction);

                document.addEventListener("click", playOnInteraction);

                document.addEventListener("mousemove", playOnInteraction);

            });

<script>
    document.addEventListener("DOMContentLoaded", function () {
    // Prevent right-click
    document.addEventListener("contextmenu", (e) => e.preventDefault());

    // Prevent common keyboard shortcuts (DevTools, Print, Save, View Source)
    document.addEventListener("keydown", (e) => {
        const blockedKeys = [
            { ctrl: true, key: ["i", "j", "u", "s", "p"] }, // Ctrl + (I, J, U, S, P)
            { key: ["F12"] }, // F12
        ];

        blockedKeys.forEach((combo) => {
            if (
                (combo.ctrl && e.ctrlKey && combo.key.includes(e.key.toLowerCase())) ||
                (combo.key.includes(e.key))
            ) {
                e.preventDefault();
                alert("This action is disabled.");
            }
        });
    });

    // Prevent text copying, cutting, and dragging images
    ["copy", "cut", "dragstart"].forEach((event) => {
        document.addEventListener(event, (e) => {
            if (e.type === "dragstart" && e.target.tagName !== "IMG") return;
            e.preventDefault();
        });
    });

    // Prevent long-press on images (touch devices)
    document.addEventListener("touchstart", (e) => {
        if (e.target.tagName === "IMG") e.preventDefault();
    });

    // Detect unauthorized browser extensions
    (function detectExtensions() {
        let iframe = document.createElement("iframe");
        iframe.style.display = "none";
        document.body.appendChild(iframe);
        setTimeout(() => {
            if (!iframe.contentWindow.chrome) {
                alert("Unauthorized browser extensions detected!");
                window.location.href = "about:blank";
            }
        }, 1000);
    })();

    // Hide content when the user switches tabs
    document.addEventListener("visibilitychange", () => {
        document.body.style.display = document.hidden ? "none" : "block";
    });

    // Detect three-finger touch gestures
    document.addEventListener(
        "touchstart",
        (event) => {
            if (event.touches.length > 2) event.preventDefault();
        },
        { passive: false }
    );

    // Prevent printing via JavaScript, context menu, or browser menu
    window.onbeforeprint = () => {
        alert("Printing is not allowed.");
        return false;
    };
    window.print = () => {
        alert("Printing is not allowed.");
        return false;
    };

    // Detect volume button changes (if supported)
    let lastVolume = 0;
    if (navigator.mediaSession) {

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Mode - Website Under Maintenance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            color: #333;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        h1 {
            color: #d9534f;
        }
        .contact-btn {
            display: inline-block;
            margin: 10px 0;
            padding: 10px 15px;
            color: white;
            background: #337ab7;
            text-decoration: none;
            border-radius: 5px;
        }
        .contact-btn:hover {
            background: #23527c;
        }
        .social-links a {
            text-decoration: none;
            color: #337ab7;
            font-weight: bold;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>We're Under Maintenance</h1>
        <p>Our website is currently undergoing scheduled maintenance. We'll be back soon!</p>

        <p>For urgent queries, contact us:</p>
        <a href="#" class="contact-btn">Email Support</a>

        <div class="social-links">
            <a href="#" target="_blank">Facebook</a> |
            <a href="#" target="_blank">Twitter</a> |
            <a href="#" target="_blank">LinkedIn</a>
        </div>
    </div>
</body>
                                     </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Mubarak - Image Gallery</title>
    <style>/* General Styles */
body {
    font-family: 'Poppins', sans-serif;
    background-color: #1e1e2f;
    color: #fff;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

/* Header */
header {
    background: linear-gradient(135deg, #1f2a44, #2e3b5e);
    color: #ffd700;
    padding: 40px 0;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    position: relative;
    animation: fadeInDown 1.5s ease;
}

header h1 {
    font-family: 'Amiri', serif;
    font-size: 4em;
    text-shadow: 3px 3px 10px rgba(255, 215, 0, 0.8);
}

header p {
    font-size: 1.5em;
    text-shadow: 1px 1px 5px rgba(255, 215, 0, 0.6);
}

header::before {
    content: "🌙";
    font-size: 100px;
    position: absolute;
    top: -20px;
    left: 10%;
    animation: moonGlow 2s infinite alternate;
}

@keyframes moonGlow {
    from { opacity: 0.7; transform: scale(1); }
    to { opacity: 1; transform: scale(1.1); }
}

/* Gallery */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    gap: 15px;
}

.image-container {
    position: relative;
    width: 200px;
    height: 200px;
    overflow: hidden;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
}

.image-container:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

/* Lightbox */
.lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    padding-top: 60px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8) url('ramadan-pattern.png') center/cover;
    text-align: center;
}

.lightbox-content {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 80vh;
    border-radius: 10px;
    animation: zoomIn 0.3s ease;
}

.close {
    position: absolute;
    top: 20px;
    right: 35px;
    color: #fff;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.3s ease;
}

.close:hover {
    color: #e74c3c;
}

.caption {
    color: #fff;
    font-size: 1.2em;
    margin-top: 10px;
}

/* Footer */
footer {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: #ffd700;
    text-align: center;
    padding: 15px 0;
    box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.3);
    font-size: 1.2em;
    text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.7);
}



/* Animations */
@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes zoomIn {
    from { transform: scale(0.8); }
    to { transform: scale(1); }
}</style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <header>
        <h1>Ramadan Mubarak</h1>
        <p>Blessed Month of Fasting, Prayer, and Reflection</p>
    </header>

    <div class="gallery">
        <!-- Add your images here -->
        <div class="image-container" data-src="A1.jpg">
            <img src="A1.jpg" alt="Day1">
        </div>
        <div class="image-container" data-src="A2.jpg">
            <img src="A2.jpg" alt="Day2">
        </div>
        <div class="image-container" data-src="A3.jpg">
            <img src="A3.jpg" alt="Day3">
        </div>
        <div class="image-container" data-src="A4.jpg">
            <img src="A4.jpg" alt="Day4">
        </div>
        <div class="image-container" data-src="A5.jpg">
            <img src="A5.jpg" alt="Day5">
        </div>
        <div class="image-container" data-src="A6.jpg">
            <img src="A6.jpg" alt="Day6">
        </div>
        <div class="image-container" data-src="A7.jpg">
            <img src="A7.jpg" alt="Day7">
        </div>
        <div class="image-container" data-src="A8.jpg">
            <img src="A8.jpg" alt="Day8">
        </div>
        <div class="image-container" data-src="A9.jpg">
            <img src="A9.jpg" alt="Ramadan Image 1">
        </div>
        <div class="image-container" data-src="A10.jpg">
            <img src="A10.jpg" alt="Ramadan Image 1">
        </div>
        <div class="image-container" data-src="A11.jpg">
            <img src="A11.jpg" alt="Ramadan Image 1">
        </div>
        <div class="image-container" data-src="images/2.jpg">
            <img src="images/2.jpg" alt="Ramadan Image 2">
        </div>
        <!-- Repeat for all 50 images -->
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="caption"></div>
    </div>

    <footer>
        <p>All rights reserved by suraj kr 😅.</p>
    </footer>

    <script>// Lightbox functionality
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxCaption = document.querySelector('.caption');
const closeBtn = document.querySelector('.close');

// Open lightbox
document.querySelectorAll('.image-container').forEach(container => {
    container.addEventListener('click', () => {
        lightbox.style.display = 'block';
        lightboxImg.src = container.getAttribute('data-src');
        lightboxCaption.textContent = container.querySelector('img').alt;
    });
});

// Close lightbox
closeBtn.addEventListener('click', () => {
    lightbox.style.display = 'none';
});

// Close lightbox when clicking outside the image
lightbox.addEventListener('click', (e) => {
    if (e.target !== lightboxImg) {
        lightbox.style.display = 'none';
    }
});</script>
    <audio id="bg-music" autoplay loop muted>
    <source src="Aaa1.mp3" type="audio/mpeg">
</audio>
<button onclick="unmute()">Unmute</button>
<script>
    function unmute() {
        let audio = document.getElementById("bg-music");
        audio.muted = false;
        audio.play();
    }
</script></body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Image Gallery</title>
    <style>/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    text-align: center;
}

.header {
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
    text-transform: uppercase;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    margin: 20px auto;
    width: 80%;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
    max-width: 90%;
    margin: auto;
}

.gallery img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0px 4px 20px rgba(255, 255, 255, 0.2);
}

/* Fullscreen View */
.fullscreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    justify-content: center;
    align-items: center;
}

.fullscreen img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}</<style>
</head>
<body>
    <div class="header">
        <h1>📸 My Stunning Gallery</h1>
    </div>
    
    <div class="gallery">
        <img src="images/img1.jpg" alt="Image 1" onclick="openFullscreen(this)">
        <img src="images/img2.jpg" alt="Image 2" onclick="openFullscreen(this)">
        <img src="images/img3.jpg" alt="Image 3" onclick="openFullscreen(this)">
        <img src="images/img4.jpg" alt="Image 4" onclick="openFullscreen(this)">
        <!-- Add more images here -->
    </div>

    <div id="fullscreen-view" class="fullscreen">
        <span class="close" onclick="closeFullscreen()">&times;</span>
        <img id="fullscreen-img">
    </div>

    <script>function openFullscreen(img) {
    document.getElementById("fullscreen-img").src = img.src;
    document.getElementById("fullscreen-view").style.display = "flex";
}

function closeFullscreen() {
    document.getElementById("fullscreen-view").style.display = "none";
}</script>
</body>
                                  </html>

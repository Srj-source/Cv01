<div id="hearts"></div>  <script>
    function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");

    // Set a random horizontal position within the viewport width
    heart.style.left = Math.random() * window.innerWidth + "px";

    // Append to body
    document.body.appendChild(heart);

    // Remove after animation completes
    setTimeout(() => {
        heart.remove();
    }, 3000);
}

// Generate hearts at an interval

const lightbox = document.getElementById('lightbox');

const lightboxCaption = document.querySelector('.caption');
const closeBtn = document.querySelector('.close');

// Open lightbox
document.querySelectorAll('.image-container').forEach(container => {

});
});

// Close lightbox
closeBtn.addEventListener('click', () => {
lightbox.style.display = 'none';
});

// Close lightbox when clicking outside the image
lightbox.addEventListener('click', (e) => {
if (e.target !== lightboxImg) {
lightbox.style.display = 'none';
}
});</script>
<audio id="bg-music" loop>
<source src="Aaa1.mp3" type="audio/mpeg">
</audio>

<script>  
    document.addEventListener("DOMContentLoaded", function () {  
        let audio = document.getElementById("bg-music");  
  
        function tryPlayAudio() {  
            audio.play().then(() => {  
                console.log("Audio autoplay successful!");  
            }).catch(() => {  
                console.log("Autoplay blocked, trying alternative methods...");  
  
                // Show an alert to encourage user action  
                alert("Click OK to enable background music.");  
  
                // Create an overlay button if needed  
                let overlay = document.createElement("div");  
                overlay.innerHTML = "<button style='font-size:20px;padding:10px 20px;'>Play Music</button>";  
                overlay.style.position = "fixed";  
                overlay.style.top = "0";  
                overlay.style.left = "0";  
                overlay.style.width = "100%";  
                overlay.style.height = "100%";  
                overlay.style.display = "flex";  
                overlay.style.alignItems = "center";  
                overlay.style.justifyContent = "center";  
                overlay.style.background = "rgba(0, 0, 0, 0.8)";  
                overlay.style.zIndex = "9999";  
                document.body.appendChild(overlay);  
  
                overlay.querySelector("button").addEventListener("click", () => {  
                    audio.play();  
                    document.body.removeChild(overlay);  
                });  
  
                // Also try playing on user interaction (click, touch, keypress, mouse move)  
                function playOnInteraction() {  
                    audio.play();  
                    document.removeEventListener("click", playOnInteraction);  
                    document.removeEventListener("touchstart", playOnInteraction);  
                    document.removeEventListener("keypress", playOnInteraction);  
                    document.removeEventListener("mousemove", playOnInteraction);  
                    document.removeEventListener("scroll", playOnInteraction);  
                }  
  
                document.addEventListener("click", playOnInteraction);  
                document.addEventListener("touchstart", playOnInteraction);  
                document.addEventListener("keypress", playOnInteraction);  
                document.addEventListener("mousemove", playOnInteraction);  
                document.addEventListener("scroll", playOnInteraction);  
            });  
        }  
  
        // First attempt at autoplay  
        tryPlayAudio();  
    });  
</script> 

<script>
    // List of emojis to show (change or add more)
    const emojis = ["❤️", "💖", "💘", "😊", "😘", "💞", "🥰", "🌸"];

    document.addEventListener("click", function(event) {
        for (let i = 0; i < 3; i++) {  // Spawn 3 emojis per click
            createEmoji(event.clientX, event.clientY);
        }
    });

    function createEmoji(x, y) {
        const emoji = document.createElement("div");
        emoji.classList.add("emoji");
        emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        
        // Set emoji position near the click
        emoji.style.left = (x + Math.random() * 30 - 15) + "px"; 
        emoji.style.top = (y + Math.random() * 30 - 15) + "px"; 
        
        // Randomize animation duration slightly
        emoji.style.animationDuration = (1.5 + Math.random() * 1.5) + "s"; 
        
        document.body.appendChild(emoji);

        // Remove emoji after animation
        setTimeout(() => { emoji.remove(); }, 2000);
    }
             </script>



<script>
    document.addEventListener("DOMContentLoaded", function () {
    // Prevent right-click
    document.addEventListener("contextmenu", (e) => e.preventDefault());

    // Prevent common keyboard shortcuts (DevTools, Print, Save, View Source)
    document.addEventListener("keydown", (e) => {
        const blockedKeys = [
            { ctrl: true, key: ["i", "j", "u", "s", "p"] }, // Ctrl + (I, J, U, S, P)
            { key: ["F12"] }, // F12
        ];

        blockedKeys.forEach((combo) => {
            if (
                (combo.ctrl && e.ctrlKey && combo.key.includes(e.key.toLowerCase())) ||
                (combo.key.includes(e.key))
            ) {
                e.preventDefault();
                alert("This action is disabled.");
            }
        });
    });

    // Prevent text copying, cutting, and dragging images
    ["copy", "cut", "dragstart"].forEach((event) => {
        document.addEventListener(event, (e) => {
            if (e.type === "dragstart" && e.target.tagName !== "IMG") return;
            e.preventDefault();
        });
    });

    // Prevent long-press on images (touch devices)
    document.addEventListener("touchstart", (e) => {
        if (e.target.tagName === "IMG") e.preventDefault();
    });

    // Detect unauthorized browser extensions
    (function detectExtensions() {
        let iframe = document.createElement("iframe");
        iframe.style.display = "none";
        document.body.appendChild(iframe);
        setTimeout(() => {
            if (!iframe.contentWindow.chrome) {
                alert("Unauthorized browser extensions detected!");
                window.location.href = "about:blank";
            }
        }, 1000);
    })();

    // Hide content when the user switches tabs
    document.addEventListener("visibilitychange", () => {
        document.body.style.display = document.hidden ? "none" : "block";
    });

    // Detect three-finger touch gestures
    document.addEventListener(
        "touchstart",
        (event) => {
            if (event.touches.length > 2) event.preventDefault();
        },
        { passive: false }
    );

    // Prevent printing via JavaScript, context menu, or browser menu
    window.onbeforeprint = () => {
        alert("Printing is not allowed.");
        return false;
    };
    window.print = () => {
        alert("Printing is not allowed.");
        return false;
    };

    // Detect volume button changes (if supported)
    let lastVolume = 0;
    if (navigator.mediaSession) {
        window.addEventListener("volumechange", () => {
            let currentVolume = navigator.mediaSession.volume;
            if (currentVolume !== lastVolume) {
                alert("Volume button detected! Screenshots are restricted.");
                lastVolume = currentVolume;
            }
        });
    }
});
    </script>
